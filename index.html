<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VPK Live">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0d1117">
<title>Tournament Live</title>
<script defer src="https://umami.mcfrojd.com/script.js" data-website-id="1b25e41f-511e-4ff9-893a-eb17339023b0"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --felt:      #0d1117;
    --felt-mid:  #161b22;
    --felt-light:#21262d;
    --gold:      #58a6ff;
    --gold-dim:  #388bfd;
    --red-bright:#f85149;
    --cream:     #e6edf3;
    --muted:     #8b949e;
    --positive:  #3fb950;
  }
  /* GitHub Dark overrides */
  .logo          { color: var(--gold); text-shadow: 0 0 30px rgba(88,166,255,0.25); }
  .level-name    { color: var(--gold); }
  .stat-val.gold { color: var(--gold); }
  .avg-bb        { color: var(--gold-dim); }
  .next-blinds-bar { background: rgba(88,166,255,0.06); border-color: rgba(88,166,255,0.2); color: var(--gold-dim); }
  .next-blinds-bar span { color: var(--cream); }
  .progress-bar  { background: linear-gradient(90deg, #388bfd, #58a6ff); }
  .blind-val.ante-val { color: var(--gold); }
  .money-card.itm { border-color: rgba(88,166,255,0.35); background: rgba(88,166,255,0.06); }
  .money-card.itm .money-card-val { color: var(--gold); }
  .status-dot.live { background: #3fb950; box-shadow: 0 0 7px rgba(63,185,80,0.7); }
  .clock-card  { border-color: rgba(88,166,255,0.2); }
  .blind-card, .stat-card, .stack-card, .money-card { border-color: #30363d; }
  header       { border-bottom-color: #30363d; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--felt); color: var(--cream);
    font-family: 'DM Mono', monospace;
    min-height: 100dvh; overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px),
      repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none; z-index: 0;
  }
  .page {
    position: relative; z-index: 1;
    padding: 16px 14px 32px;
    max-width: 600px; margin: 0 auto;
  }

  /* ── TOURNAMENT TITLE ── */
  .tourney-title-block {
    margin-bottom: 10px;
  }
  .tourney-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.35rem; letter-spacing: 0.08em;
    color: var(--cream); line-height: 1.1;
  }
  .tourney-desc {
    font-size: 0.75rem; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--muted);
    margin-top: 4px;
  }

  /* ── HEADER ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; padding-bottom: 14px;
    border-bottom: 1px solid var(--gold-dim);
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.9rem;
    letter-spacing: 0.1em; color: var(--gold);
    text-shadow: 0 0 30px rgba(200,169,74,0.35); line-height: 1;
  }
  .status-pill {
    display: flex; align-items: center; gap: 7px;
    font-size: 0.75rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted); padding: 5px 12px;
    border: 1px solid var(--felt-light); border-radius: 2px;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted); transition: background 0.3s; flex-shrink: 0;
  }
  .status-dot.live { background: #2ecc71; box-shadow: 0 0 7px rgba(46,204,113,0.7); animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── CLOCK CARD ── */
  .clock-card {
    background: var(--felt-mid);
    border: 1px solid rgba(200,169,74,0.18);
    border-radius: 6px; padding: 18px 18px 14px;
    margin-bottom: 12px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0 16px;
  }
  .level-label {
    font-size: 0.75rem; letter-spacing: 0.25em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 4px;
  }
  .level-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem; letter-spacing: 0.06em; color: var(--gold); line-height: 1;
  }
  .level-sub { font-size: 0.6rem; color: var(--muted); margin-top: 4px; }
  .clock-wrap {
    display: flex; flex-direction: column; align-items: flex-end;
  }
  .clock-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 4.2rem; letter-spacing: 0.04em; line-height: 1;
    color: #fff; text-shadow: 0 0 40px rgba(255,255,255,0.12);
    transition: color 0.4s;
  }
  .clock-display.warning { color: #f39c12; text-shadow: 0 0 20px rgba(243,156,18,0.5); }
  .clock-display.critical { color: var(--red-bright); text-shadow: 0 0 20px rgba(231,76,60,0.5); animation: flicker 1s infinite; }
  @keyframes flicker { 0%,100%{opacity:1} 50%{opacity:.65} }
  .clock-status {
    font-size: 0.82rem; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--muted); margin-top: 3px; text-align: right;
  }
  .clock-status.paused { color: #f39c12; }
  .clock-status.break-st { color: #5b9bd5; }
  .progress-wrap { grid-column: 1 / -1; margin-top: 12px; }
  .progress-track { height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
  .progress-bar { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--gold-dim), var(--gold)); transition: width 1s linear; }

  /* ── NEXT BLINDS BAR ── */
  .next-blinds-bar {
    background: rgba(200,169,74,0.07);
    border: 1px solid rgba(200,169,74,0.18);
    border-radius: 5px;
    padding: 9px 14px;
    margin-bottom: 8px;
    font-size: 0.82rem;
    letter-spacing: 0.08em;
    color: var(--gold-dim);
    text-align: center;
  }
  .next-blinds-bar span { color: var(--cream); }

  /* ── BLINDS ── */
  /* Default: 3 columns (with ante) */
  .blinds-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px; margin-bottom: 12px;
  }
  /* No ante: 2 columns, bigger cards */
  .blinds-row.no-ante {
    grid-template-columns: 1fr 1fr;
  }
  .blind-card {
    background: var(--felt-mid);
    border: 1px solid rgba(200,169,74,0.13);
    border-radius: 5px; padding: 14px 14px 12px;
    text-align: center;
  }
  .no-ante .blind-card {
    padding: 20px 20px 16px;
  }
  .blind-lbl {
    font-size: 0.82rem; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 5px;
  }
  .no-ante .blind-lbl { font-size: 0.75rem; }
  .blind-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.9rem; letter-spacing: 0.04em; line-height: 1.1; color: var(--cream);
  }
  .no-ante .blind-val { font-size: 2.4rem; }
  .blind-val.ante-val { color: var(--gold); font-size: 1.4rem; }

  /* ── STATS 2×2 ── */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .stat-card {
    background: var(--felt-mid);
    border: 1px solid rgba(200,169,74,0.13);
    border-radius: 5px; padding: 14px 14px 12px;
    text-align: center;
  }
  .stat-lbl { font-size: 0.82rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
  .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.9rem; letter-spacing: 0.03em; line-height: 1.1; color: var(--cream); }
  .stat-val.green { color: #2ecc71; }
  .stat-val.gold  { color: var(--gold); }
  .stat-sub { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

  /* ── STACK ── */
  .stack-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }
  .stack-card {
    background: var(--felt-mid);
    border: 1px solid #30363d;
    border-radius: 5px;
    padding: 14px 14px 12px;
    text-align: center;
  }
  .panel-ttl { font-size: 0.82rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold-dim); margin-bottom: 8px; }
  .avg-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.9rem; letter-spacing: 0.03em; color: var(--cream); line-height: 1; }
  .avg-bb { font-size: 0.82rem; color: var(--gold-dim); margin-top: 5px; letter-spacing: 0.08em; }
  .avg-sub { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

  /* ── BOTTOM INFO ROW ── */
  .money-info-bar {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }
  .money-card {
    background: var(--felt-mid);
    border: 1px solid rgba(200,169,74,0.13);
    border-radius: 5px;
    padding: 14px 16px;
    text-align: center;
  }
  .money-card.busts {
    border-color: rgba(231,76,60,0.3);
    background: rgba(231,76,60,0.05);
  }
  .money-card.itm {
    border-color: rgba(200,169,74,0.3);
    background: rgba(200,169,74,0.05);
  }
  .money-card-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem; letter-spacing: 0.04em; line-height: 1;
  }
  .money-card.busts .money-card-val { color: #e74c3c; }
  .money-card.itm .money-card-val   { color: var(--gold); }
  .money-card-lbl {
    font-size: 0.75rem; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--muted);
    margin-top: 6px;
  }


  /* ── TOURNAMENT TITLE ROW ── */
  .tourney-title-row {
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .tourney-left  { flex: 1; }
  .tourney-right { text-align: right; flex-shrink: 0; padding-left: 12px; }
  .tourney-game-lbl {
    font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 2px;
  }
  .tourney-game-val {
    font-size: 0.82rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--gold);
  }

  /* ── HOUSE CONTRIBUTION SUB ── */
  .house-contrib-sub {
    font-size: 0.75rem; color: var(--muted);
    margin-top: 5px; letter-spacing: 0.05em;
  }
  .house-contrib-sub span { color: var(--cream); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--felt-mid); border: 1px solid var(--gold-dim);
    border-radius: 3px; padding: 10px 18px;
    font-size: 0.68rem; letter-spacing: 0.1em; color: var(--gold);
    z-index: 999; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  @keyframes val-flash { 0%{color:var(--gold)} 100%{color:inherit} }
  .changed { animation: val-flash 0.7s ease-out; }
</style>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♠</text></svg>">

<body>
<div class="page">

  <header>
    <div class="logo">♠ Tournament Live</div>
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Waiting</span>
    </div>
  </header>

  <!-- Tournament title -->
  <div class="tourney-title-block" id="tourneyTitleBlock" style="display:none">
    <div class="tourney-title-row">
      <div class="tourney-left">
        <div class="tourney-name" id="tourneyName"></div>
        <div class="tourney-desc" id="tourneyDesc"></div>
      </div>
      <div class="tourney-right" id="gameTypeBlock" style="display:none">
        <div class="tourney-game-lbl" id="lbl-nowPlaying">Game</div>
        <div class="tourney-game-val" id="gameTypeName"></div>
      </div>
    </div>
  </div>

  <!-- Clock -->
  <div class="clock-card">
    <div>
      <div class="level-label" id="lbl-currentLevel">Current level</div>
      <div class="level-name" id="levelName">—</div>
    </div>
    <div class="clock-wrap">
      <div class="clock-display" id="clockDisplay">--:--</div>
      <div class="clock-status" id="clockStatus">time left</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    </div>
  </div>

  <!-- Blinds -->
  <div class="blinds-row" id="blindsRow">
    <div class="blind-card">
      <div class="blind-lbl" id="lbl-smallBlind">Small blind</div>
      <div class="blind-val" id="smallBlind">—</div>
    </div>
    <div class="blind-card">
      <div class="blind-lbl" id="lbl-bigBlind">Big blind</div>
      <div class="blind-val" id="bigBlind">—</div>
    </div>
    <div class="blind-card" id="anteBlock">
      <div class="blind-lbl" id="lbl-ante">Ante</div>
      <div class="blind-val ante-val" id="ante">—</div>
    </div>
  </div>

  <!-- Next blinds -->
  <div class="next-blinds-bar" id="nextBlindsTag" style="display:none">
    <span id="nextLabel">Next:</span> <span id="nextLevelInfo">—</span>&nbsp;·&nbsp;<span id="nextBlinds">—</span>
  </div>

  <!-- Stats 2×2 -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-lbl" id="lbl-players">Players left</div>
      <div class="stat-val green" id="playersRemaining">—</div>
      <div class="stat-sub" id="playersSub"></div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl" id="lbl-prizePool">Prize pool</div>
      <div class="stat-val gold" id="prizePool">—</div>
      <div class="stat-sub" id="prizePoolSub"></div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl" id="lbl-rebuys">rebuys/Addons</div>
      <div class="stat-val" id="rebuysAddons">—/—</div>
      <div class="stat-sub" id="rebuysAddonsSub"></div>
    </div>
    <div class="stat-card" id="houseCard">
      <div class="stat-lbl" id="lbl-house">Buy-in</div>
      <div class="stat-val" id="buyInVal">—</div>
      <div class="house-contrib-sub" id="houseContribRow" style="display:none">
        + <span id="houseContrib">—</span> <span id="lbl-houseRow">house adds</span>
      </div>
    </div>
  </div>

  <!-- Avg stack & Total -->
  <div class="stack-grid">
    <div class="stack-card">
      <div class="panel-ttl" id="lbl-avgStack">Avg stack</div>
      <div class="avg-num" id="avgStack">—</div>
      <div class="avg-bb" id="stacksBB">— BB</div>
    </div>
    <div class="stack-card">
      <div class="panel-ttl" id="lbl-totalChips">Chips in play</div>
      <div class="avg-num" id="totalChips">—</div>
      <div class="avg-sub" id="tablesInfo">— tables</div>
    </div>
  </div>


  <!-- Paid places & busts to money -->
  <div class="money-info-bar" id="moneyInfoBar" style="display:none">
    <div class="money-card itm">
      <div class="money-card-val" id="itmCount">—</div>
      <div class="money-card-lbl" id="lbl-paidPlaces">paid places</div>
    </div>
    <div class="money-card busts">
      <div class="money-card-val" id="bustsCount">—</div>
      <div class="money-card-lbl" id="bustsLbl">busts to money</div>
    </div>
  </div>

</div><!-- /page -->

<div class="toast" id="toast"></div>

<script>

// Settings are loaded from settings.json + locales/en.json at startup
let settings = { currency: '$', warnThreshold: 120, critThreshold: 30, pollIntervalSeconds: 90 };
const LANG = {};
const currentLang = 'en';

function applyStaticLabels() {
  const t = LANG[currentLang];
  // Static HTML labels
  const map = {
    'lbl-currentLevel': t.currentLevel,
    'lbl-smallBlind':   t.smallBlind,
    'lbl-bigBlind':     t.bigBlind,
    'lbl-ante':         t.ante,
    'lbl-players':      t.players,
    'lbl-prizePool':    t.prizePool,
    'lbl-rebuys':       t.rebuys,
    'lbl-house':        t.house,
    'lbl-avgStack':     t.avgStack,
    'lbl-totalChips':   t.totalChips,
    'lbl-house':        t.house,
    'lbl-buyin2':       t.buyin2,
    'lbl-houseRow':     t.houseRow,
    'lbl-nowPlaying':   t.nowPlaying,
    'lbl-paidPlaces':   t.paidPlaces,
    'lbl-bustsTill':    t.bustsTill,
  };
  Object.entries(map).forEach(([id, txt]) => {
    const e = document.getElementById(id);
    if (e) e.textContent = txt;
  });
  // Logo text and page title
  const logo = document.querySelector('.logo');
  if (logo) logo.textContent = '♠ ' + t.logoTitle;
  document.title = t.logoTitle;
  // "Next:" label
  const nextLblEl = document.getElementById('nextLabel');
  if (nextLblEl) nextLblEl.textContent = t.nextLbl;
}

function t(key) { return LANG[currentLang][key] || key; }


function fmt(n) { return Number(n).toLocaleString('en-US'); }
function fmtMoney(n) { return settings.currency + '\u00a0' + Number(n).toLocaleString('en-US'); }
function fmtTime(secs) {
  secs = Math.max(0, Math.round(secs));
  return String(Math.floor(secs/60)).padStart(2,'0') + ':' + String(secs%60).padStart(2,'0');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
function el(id) { return document.getElementById(id); }
function setText(id, val, flash) {
  const e = el(id); if (!e) return;
  if (e.textContent !== String(val)) {
    e.textContent = val;
    if (flash) { e.classList.remove('changed'); void e.offsetWidth; e.classList.add('changed'); }
  }
}

// ── NORMALIZE ─────────────────────────────────────────────────────────────
function normalize(raw) {
  const g = (p, c) => { const v = raw[p] !== undefined ? raw[p] : raw[c]; return v !== undefined ? v : null; };
  const roundName   = raw.RoundName || raw.roundName || null;
  const roundNum    = g('RoundNum','roundNumber');
  const level       = g('Level','level');
  const isRound     = g('IsRound','isRound');
  const stateDesc   = raw.StateDesc || raw.stateDesc || null;
  const secsLeft    = g('SecondsLeft','timeRemaining');
  const secsElapsed = g('SecondsElapsed','secsElapsed');
  const levelDurRaw = raw.LevelDuration != null ? raw.LevelDuration : raw.levelDuration;
  const sb          = g('SmallBlind','smallBlind');
  const bb          = g('BigBlind','bigBlind');
  const ante        = g('Ante','ante');
  const nextSb      = g('NextSmallBlind','nextSmallBlind');
  const nextBb      = g('NextBigBlind','nextBigBlind');
  const nextRoundName = raw.NextRoundName || raw.nextRoundName || null;
  const playersLeft = g('PlayersLeft','playersRemaining');
  const buyins      = g('Buyins','totalPlayers');
  const tablesLeft  = g('TablesLeft','tables');
  const prizePool   = raw.Pot != null ? raw.Pot : (raw.prizePool || null);
  const totalChips  = raw.ChipCount != null ? raw.ChipCount : (raw.totalChips || null);
  const avgStack    = (totalChips != null && playersLeft != null && Number(playersLeft) > 0)
                      ? Math.round(Number(totalChips) / Number(playersLeft)) : (raw.avgStack || null);
  const rebuys      = raw.TotalRebuys != null ? raw.TotalRebuys : (raw.rebuys || null);
  const addons      = raw.TotalAddons != null ? raw.TotalAddons : (raw.addons || null);
  const buyIn       = raw.DefaultBuyinFee != null ? raw.DefaultBuyinFee : (raw.BuyIn || raw.buyIn || null);
  const inTheMoney  = raw.InTheMoneyRank || null;
  const bustsUntilMoney = raw.BustsUntilMoney != null ? raw.BustsUntilMoney : null;
  const houseContrib = raw.HouseContribution != null ? raw.HouseContribution : (raw.houseContribution || null);
  const tName       = raw.Title || raw.TournamentName || raw.tournamentName || null;
  const levelDurSecs = levelDurRaw != null ? Number(levelDurRaw) * 60 : 900;
  const isPaused    = raw.ClockPaused == 1 || raw.Paused == 1 || raw.paused === true;
  return {
    tournamentName: tName,
    roundName:  roundName || null,  // translated in render
    roundNumber: roundNum, level, isRound, stateDesc,
    paused: isPaused,
    onBreak: raw.IsBreak == 1 || isRound == 0,
    timeRemaining: secsLeft != null ? Number(secsLeft) : null,
    levelDuration: levelDurSecs,
    smallBlind: sb != null ? Number(sb) : null,
    bigBlind:   bb != null ? Number(bb) : null,
    ante: ante != null && Number(ante) > 0 ? Number(ante) : null,
    nextSmallBlind: nextSb != null ? Number(nextSb) : null,
    nextBigBlind:   nextBb != null ? Number(nextBb) : null,
    nextRoundName,
    playersRemaining: playersLeft != null ? Number(playersLeft) : null,
    totalPlayers: buyins != null ? Number(buyins) : null,
    tables: tablesLeft != null ? Number(tablesLeft) : null,
    prizePool:  prizePool  != null ? Number(prizePool)  : null,
    totalChips: totalChips != null ? Number(totalChips) : null,
    avgStack:   avgStack   != null ? Number(avgStack)   : null,
    rebuys:     rebuys     != null ? Number(rebuys)     : null,
    addons:     addons     != null ? Number(addons)     : null,
    buyIn:      buyIn      != null ? Number(buyIn)      : null,
    inTheMoney, bustsUntilMoney,
    houseContrib: houseContrib != null ? Number(houseContrib) : null,
    description: raw.Description || raw.description || null,
    _raw: raw
  };
}

// ── RENDER ────────────────────────────────────────────────────────────────
let lastRenderedData = null;
function render(rawData) {
  lastRenderedData = rawData;
  const d = normalize(rawData);
  // Settings are hardcoded (no admin page)

  // Status
  el('statusDot').className = 'status-dot live';
  el('statusText').textContent =
    d.stateDesc === 'before' ? t('prestart') :
    d.stateDesc === 'after'  ? t('finished') :
    d.paused ? t('paused') : t('live');

  // Level
  const levelDisplayName = d.roundName ||
    (d.onBreak ? t('break') : t('level') + ' ' + d.roundNumber);
  setText('levelName', levelDisplayName || '—', true);
  // levelNumber element removed — shown in the next-level row instead
  // Next: show "Break" if NextIsBreak, otherwise compute the next playing round
  let nextLvlLabel;
  if (d._raw && d._raw.NextIsBreak == 1) {
    nextLvlLabel = t('break');
  } else if (d._raw) {
    // During a break: RoundNum = next playing round (e.g. 11 → "Level 11")
    // During a playing round: RoundNum = current round, next = RoundNum + 1
    const nextRound = d._raw.IsBreak == 1
      ? Number(d._raw.RoundNum)
      : Number(d._raw.RoundNum) + 1;
    nextLvlLabel = t('level') + ' ' + nextRound;
  } else {
    nextLvlLabel = d.nextRoundName || '—';
  }
  setText('nextLevelInfo', nextLvlLabel);

  // Sync local clock with the TD's value
  const tr = d.timeRemaining != null ? d.timeRemaining : 0;
  const ld = d.levelDuration || 900;
  lastSyncTime = Date.now();
  localClock = {
    secsLeft: tr,
    levelDuration: ld,
    paused: d.paused,
    onBreak: d.onBreak,
    bigBlind: d.bigBlind,
    warnThreshold: settings.warnThreshold,
    critThreshold: settings.critThreshold
  };
  updateClockDisplay();

  const csEl = el('clockStatus');
  if (d.paused)       { csEl.textContent = t('pausedLbl');  csEl.className = 'clock-status paused'; }
  else if (d.onBreak) { csEl.textContent = t('breakLbl');    csEl.className = 'clock-status break-st'; }
  else                { csEl.textContent = t('timeLeft');   csEl.className = 'clock-status'; }

  // Next blinds row
  if (d.nextSmallBlind || d.nextBigBlind) {
    el('nextBlindsTag').style.display = 'block';
    setText('nextBlinds', fmt(d.nextSmallBlind||0) + ' / ' + fmt(d.nextBigBlind||0));
  } else {
    el('nextBlindsTag').style.display = 'none';
  }

  // Blinds — toggle ante column and card sizing
  setText('smallBlind', d.smallBlind != null ? fmt(d.smallBlind) : '—', true);
  setText('bigBlind',   d.bigBlind   != null ? fmt(d.bigBlind)   : '—', true);
  const blindsRow = el('blindsRow');
  if (d.ante) {
    el('anteBlock').style.display = 'block';
    blindsRow.classList.remove('no-ante');
    setText('ante', fmt(d.ante), true);
  } else {
    el('anteBlock').style.display = 'none';
    blindsRow.classList.add('no-ante');
  }

  // Stats
  const isBefore = d.stateDesc === 'before';
  if (isBefore) {
    el('lbl-players').textContent = t('purchased');
    setText('playersRemaining', d.totalPlayers != null ? d.totalPlayers : '—', true);
    setText('playersSub', '');
  } else {
    el('lbl-players').textContent = t('players');
    setText('playersRemaining', d.playersRemaining != null ? d.playersRemaining : '—', true);
    setText('playersSub', d.totalPlayers ? t('of') + ' ' + d.totalPlayers + ' ' + t('entered') : '');
  }

  setText('prizePool', d.prizePool != null ? fmtMoney(d.prizePool) : '—', true);
  setText('prizePoolSub', '');

  setText('rebuysAddons', (d.rebuys != null ? d.rebuys : '—') + ' / ' + (d.addons != null ? d.addons : '—'), true);
  const totalReentries = (d.rebuys || 0) + (d.addons || 0);
  const rebuysOpen = d._raw && d._raw.RebuysAllowed && !d._raw.RebuysOver;
  setText('rebuysAddonsSub', totalReentries ? totalReentries + ' ' + t('total') + (rebuysOpen ? ' · ' + t('open') : '') : (rebuysOpen ? t('rebuysOpen') : ''));

  // Buy-in / House contribution box
  setText('buyInVal', d.buyIn != null ? fmtMoney(d.buyIn) : '—', true);
  const houseRow = el('houseContribRow');
  if (d.houseContrib && d.houseContrib > 0) {
    houseRow.style.display = 'block';
    setText('houseContrib', fmtMoney(d.houseContrib), true);
  } else {
    houseRow.style.display = 'none';
  }

  // Stack
  const avg = d.avgStack;
  setText('avgStack', avg ? fmt(avg) : '—', true);
  const bbVal = d.bigBlind && avg ? Math.round(avg / d.bigBlind) : null;
  setText('stacksBB', bbVal ? bbVal + ' BB' : '— BB');
  setText('totalChips', d.totalChips != null ? fmt(d.totalChips) : '—', true);
  setText('tablesInfo', d.tables ? d.tables + ' ' + t('tables') : '— bord');

  if (d.tournamentName) document.title = d.tournamentName + ' — Live';

  // Paid places & busts to money — hidden during pre-start
  const bar = el('moneyInfoBar');
  if (!isBefore && (d.inTheMoney || d.bustsUntilMoney != null)) {
    bar.style.display = 'grid';
    setText('itmCount', d.inTheMoney || '—');
    if (d.bustsUntilMoney === 0) {
      setText('bustsCount', '🏆');
      setText('bustsLbl', t('inTheMoney'));
      el('bustsBadge') && (el('bustsBadge').style.display='none');
    } else {
      setText('bustsCount', d.bustsUntilMoney != null ? d.bustsUntilMoney : '—');
      setText('bustsLbl', t('bustsTill'));
    }
  } else {
    bar.style.display = 'none';
  }

  // Tournament title + description + game type
  const titleBlock = el('tourneyTitleBlock');
  const hasTitle = d.tournamentName || d.description;
  if (hasTitle) {
    titleBlock.style.display = 'block';
    setText('tourneyName', d.tournamentName || '');
    setText('tourneyDesc', d.description || '');
    el('tourneyDesc').style.display = d.description ? 'block' : 'none';
  } else {
    titleBlock.style.display = 'none';
  }
  // GameName — "Nu spelas" / "Game"
  const gameName = d._raw && d._raw.GameName ? d._raw.GameName : null;
  const gameBlock = el('gameTypeBlock');
  if (gameName) {
    gameBlock.style.display = 'block';
    setText('gameTypeName', gameName);
  } else {
    gameBlock.style.display = 'none';
  }
}

// ── LOCAL COUNTDOWN ─────────────────────────────────────────────────────
// The clock ticks locally every second and syncs with the TD's value on each update.
let localClock = null;      // { secsLeft, paused, levelDuration, bigBlind }
let clockHandle = null;
let lastSyncTime = null;    // when the last TD sync happened

function startLocalClock() {
  if (clockHandle) clearInterval(clockHandle);
  clockHandle = setInterval(() => {
    if (!localClock || localClock.paused) return;  // still ticks during pause
    localClock.secsLeft = Math.max(0, localClock.secsLeft - 1);
    updateClockDisplay();
  }, 1000);
}

function updateClockDisplay() {
  if (!localClock) return;
  const tr = localClock.secsLeft;
  const ld = localClock.levelDuration || 900;
  const clockEl = el('clockDisplay');
  clockEl.textContent = fmtTime(tr);
  clockEl.className = 'clock-display';
  if (localClock.paused)              clockEl.classList.add('warning');
  else if (tr <= settings.critThreshold) clockEl.classList.add('critical');
  else if (tr <= settings.warnThreshold) clockEl.classList.add('warning');
  el('progressBar').style.width = ld > 0 ? Math.max(0,Math.min(100,(1-tr/ld)*100))+'%' : '0%';
}

// ── POLLING ────────────────────────────────────────────────────────────────
let pollHandle = null;
let lastDataHash = null;

function startPolling(url, secs) {
  if (pollHandle) clearInterval(pollHandle);
  async function poll() {
    try {
      const r = await fetch(url + '?t=' + Date.now(), { cache: 'no-store' });
      if (!r.ok) return;
      const d = await r.json();
      if (!d || Object.keys(d).length === 0) return;
      const hash = JSON.stringify(d);
      if (hash !== lastDataHash) {
        lastDataHash = hash;
        render(d);
      }
    } catch(e) {}
  }
  poll();
  pollHandle = setInterval(poll, (secs || 10) * 1000);
}

// ── INIT ───────────────────────────────────────────────────────────────────
async function init() {
  // Load settings.json
  try {
    const s = await fetch('settings.json?v=' + Date.now()).then(r => r.json());
    if (s.currency)            settings.currency            = s.currency;
    if (s.warnThreshold)       settings.warnThreshold       = s.warnThreshold;
    if (s.critThreshold)       settings.critThreshold       = s.critThreshold;
    if (s.pollIntervalSeconds) settings.pollIntervalSeconds = s.pollIntervalSeconds;
    // Load the English locale
    const t = await fetch('locales/en.json?v=' + Date.now()).then(r => r.json());
    LANG.en = t;
  } catch(e) {
    console.warn('Could not load settings.json, using defaults.');
    // Fallback: inline defaults so the page still works
    LANG.en = {"waiting":"Waiting","prestart":"Pre-game","finished":"Finished","paused":"Paused","live":"Live","currentLevel":"Current level","timeLeft":"time left","pausedLbl":"⏸ Paused","breakLbl":"☕ Break","logoTitle":"Tournament Live","nextLbl":"Next:","smallBlind":"Small blind","bigBlind":"Big blind","ante":"Ante","players":"Players left","of":"of","entered":"entered","prizePool":"Prize pool","buyin":"Buy-in:","rebuys":"Rebuys / Add-ons","total":"total","open":"open","rebuysOpen":"rebuys open","house":"Buy-in","buyin2":"Buy-in:","houseRow":"house adds","fromHouse":"from the house","purchased":"Buy-ins sold","chipsInPlay":"Chips in play","nowPlaying":"Game","avgStack":"Avg stack","totalChips":"Chips in play","tables":"tables","paidPlaces":"paid places","bustsTill":"busts to $","inTheMoney":"🏆 in the money!","break":"Break","level":"Level"};
  }

  applyStaticLabels();
  startLocalClock();
  if (location.protocol !== 'file:') {
    startPolling('/td-receiver', settings.pollIntervalSeconds || 90);
  }
}
init();

// ── SERVICE WORKER ────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js')
      .catch(err => console.warn('SW registration failed:', err));
  });
}
</script>
